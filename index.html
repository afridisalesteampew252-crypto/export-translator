<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Doc Auto-Extract Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 10px; margin: 0; }
        .card { background: white; max-width: 700px; margin: 10px auto; padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #0070f3; margin-bottom: 20px; padding-bottom: 10px; }
        .upload-area { border: 2px dashed #0070f3; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; background: #f9fbff; }
        .btn { background: #0070f3; color: white; border: none; padding: 18px; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; }
        .btn:disabled { background: #adb5bd; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        @media (max-width: 500px) { .result-grid { grid-template-columns: 1fr; } }
        .field-box { border: 1px solid #e1e4e8; padding: 10px; border-radius: 6px; border-left: 4px solid #0070f3; }
        .label { font-size: 10px; color: #6a737d; display: block; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: bold; color: #24292e; }
        .status-msg { text-align: center; font-size: 13px; margin: 10px 0; color: #d35400; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const EXTRACTION_MAP = [
            { label: "Chassis No (VIN)", key: "vin", regex: /車台番号\s*([A-Z0-9-]+)/i },
            { label: "Engine Model", key: "engine", regex: /原動機の型式\s*([A-Z0-9]+)/i },
            { label: "First Reg. Date", key: "firstReg", regex: /初度登録年月\s*([^\s\n]+)/ },
            { label: "Registration No", key: "regNo", regex: /登録番号\s*([^\s]+)/ },
            { label: "Latest Owner", key: "lastOwner", regex: /Latest Owner\s*\n\s*([^\n]+)/ },
            { label: "Owner Address", key: "addr", regex: /Address of Owner\s*\n\s*([^\n]+)/ },
            { label: "FF Weight (kg)", key: "ff", regex: /前前軸重\s*(\d+)/ },
            { label: "RR Weight (kg)", key: "rr", regex: /後後軸重\s*(\d+)/ },
            { label: "Mileage", key: "mile", regex: /(\d{1,3}(,\d{3})*)\s*km/ }
        ];

        function App() {
            const [preview, setPreview] = React.useState(null);
            const [status, setStatus] = React.useState("");
            const [results, setResults] = React.useState({});
            const [loading, setLoading] = React.useState(false);

            const onFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setStatus("Loading file...");
                if (file.type === "application/pdf") {
                    const reader = new FileReader();
                    reader.onload = async function() {
                        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({scale: 2.0});
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({canvasContext: ctx, viewport}).promise;
                        setPreview(canvas.toDataURL());
                        setStatus("Ready to scan.");
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    setPreview(URL.createObjectURL(file));
                    setStatus("Ready to scan.");
                }
            };

            const runOCR = async () => {
                setLoading(true);
                setStatus("AI is initializing (Please wait)...");
                try {
                    // Mobile-specific worker configuration
                    const worker = await Tesseract.createWorker('jpn+eng', 1, {
                        logger: m => {
                            if(m.status === 'recognizing text') setStatus(`Reading: ${Math.floor(m.progress * 100)}%`);
                        }
                    });

                    const { data: { text } } = await worker.recognize(preview);
                    await worker.terminate();

                    const data = {};
                    EXTRACTION_MAP.forEach(item => {
                        const match = text.match(item.regex);
                        data[item.key] = match ? match[1].trim() : "Not Found";
                    });

                    setResults(data);
                    setStatus("Scan Complete!");
                } catch (err) {
                    console.error(err);
                    setStatus("Error: Try a clearer photo or PDF.");
                }
                setLoading(false);
            };

            return (
                <div className="card">
                    <div className="header"><h2>Export Translator Pro</h2></div>
                    <div className="upload-area" onClick={() => document.getElementById('f').click()}>
                        {preview ? <img src={preview} style={{width:'100%', maxHeight:'150px'}} /> : "Tap to Upload"}
                        <input id="f" type="file" hidden onChange={onFile} />
                    </div>
                    <button className="btn" onClick={runOCR} disabled={loading || !preview}>
                        {loading ? "Processing..." : "Extract Data Now"}
                    </button>
                    <div className="status-msg">{status}</div>
                    <div className="result-grid">
                        {Object.keys(results).length > 0 && EXTRACTION_MAP.map(item => (
                            <div key={item.key} className="field-box">
                                <span className="label">{item.label}</span>
                                <span className="value">{results[item.key]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
