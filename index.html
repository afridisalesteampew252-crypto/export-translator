<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Doc Auto-Extract Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 10px; margin: 0; color: #333; }
        .card { background: white; max-width: 700px; margin: 10px auto; padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #0070f3; margin-bottom: 20px; padding-bottom: 10px; }
        .upload-area { border: 2px dashed #0070f3; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 20px; cursor: pointer; background: #f9fbff; }
        .btn { background: #0070f3; color: white; border: none; padding: 18px; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #adb5bd; cursor: not-allowed; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        @media (max-width: 500px) { .result-grid { grid-template-columns: 1fr; } }
        .field-box { border: 1px solid #e1e4e8; padding: 12px; border-radius: 6px; background: #fff; border-left: 4px solid #0070f3; }
        .label { font-size: 11px; color: #6a737d; display: block; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .value { font-size: 15px; color: #24292e; font-weight: 700; word-break: break-word; }
        .status-msg { text-align: center; font-size: 14px; margin: 10px 0; color: #0070f3; font-style: italic; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const EXTRACTION_MAP = [
            { label: "Registration No", key: "regNo", regex: /登録番号\s*([^\s]+)/ },
            { label: "Registration Date", key: "regDate", regex: /登録年月日\s*([^\s\n]+)/ },
            { label: "First Reg. Date", key: "firstReg", regex: /初度登録年月\s*([^\s\n]+)/ },
            { label: "Chassis No (VIN)", key: "vin", regex: /車台番号\s*([A-Z0-9-]+)/i },
            { label: "Trademark", key: "make", regex: /車名\s*([^\s\n]+)/ },
            { label: "Model Code", key: "model", regex: /型式\s*([A-Z0-9-]+)/i },
            { label: "Engine Model", key: "engine", regex: /原動機の型式\s*([A-Z0-9]+)/i },
            { label: "Owner's Name", key: "owner", regex: /所有者の氏名又は名称\s*([^\s\n]+[^\n]+)/ },
            { label: "Owner's Address", key: "ownerAddr", regex: /所有者の住所\s*([^\s\n]+[^\n]+)/ },
            { label: "Latest Owner", key: "lastOwner", regex: /一時抹消中所有者\/Latest Owner\s*([^\s\n]+[^\n]+)/ },
            { label: "Latest Owner Address", key: "lastAddr", regex: /Latest Owner\]\s*\n\s*([^\s\n]+[^\n]+)/ },
            { label: "Export Scheduled Date", key: "exportDate", regex: /輸出予定日\s*([^\s\n]+[^\n]+)/ },
            { label: "Fuel Type", key: "fuel", regex: /燃料の種別\s*([^\s\n]+)/ },
            { label: "Specification No", key: "specNo", regex: /型式指定番号\s*(\d+)/ },
            { label: "Classification No", key: "classNo", regex: /類別区分番号\s*(\d+)/ },
            { label: "Length (cm)", key: "length", regex: /長さ\s*(\d+)/ },
            { label: "Width (cm)", key: "width", regex: /幅\s*(\d+)/ },
            { label: "Height (cm)", key: "height", regex: /高さ\s*(\d+)/ },
            { label: "FF Weight (kg)", key: "ff", regex: /前前軸重\s*(\d+)/ },
            { label: "RR Weight (kg)", key: "rr", regex: /後後軸重\s*(\d+)/ },
            { label: "Mileage (Odometer)", key: "mileage", regex: /(\d{1,3}(,\d{3})*)\s*km/ }
        ];

        function App() {
            const [filePreview, setFilePreview] = React.useState(null);
            const [status, setStatus] = React.useState("");
            const [isScanning, setIsScanning] = React.useState(false);
            const [data, setData] = React.useState({});

            const processFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setStatus("Loading file...");
                if (file.type === "application/pdf") {
                    const reader = new FileReader();
                    reader.onload = async function() {
                        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({scale: 2.5});
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({canvasContext: ctx, viewport}).promise;
                        setFilePreview(canvas.toDataURL());
                        setStatus("PDF ready for scanning.");
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    setFilePreview(URL.createObjectURL(file));
                    setStatus("Image ready for scanning.");
                }
            };

            const runAI = async () => {
                setIsScanning(true);
                setStatus("AI is reading Japanese characters...");
                
                try {
                    const { data: { text } } = await Tesseract.recognize(filePreview, 'jpn+eng');
                    console.log("Extracted Text:", text); // For debugging
                    
                    const extracted = {};
                    EXTRACTION_MAP.forEach(item => {
                        const match = text.match(item.regex);
                        extracted[item.key] = match ? match[1].trim() : "Not Found";
                    });
                    
                    setData(extracted);
                    setStatus("Extraction Complete!");
                } catch (err) {
                    setStatus("Error during scanning.");
                }
                setIsScanning(false);
            };

            return (
                <div className="card">
                    <div className="header">
                        <h1 style={{margin:0, fontSize: '22px'}}>Auto Export Translator</h1>
                        <p style={{fontSize: '12px', color:'#666'}}>Extract all data from Japanese Export Certificates</p>
                    </div>
                    
                    <div className="upload-area" onClick={() => document.getElementById('hiddenInput').click()}>
                        {filePreview ? <img src={filePreview} style={{width:'100%', maxHeight:'200px', objectFit:'contain'}} /> : <p>Tap to Upload Certificate (PDF or JPG)</p>}
                        <input id="hiddenInput" type="file" hidden onChange={processFile} accept="image/*,application/pdf" />
                    </div>

                    <button className="btn" onClick={runAI} disabled={isScanning || !filePreview}>
                        {isScanning ? "Processing Documentation..." : "Extract All Data Now"}
                    </button>
                    
                    <div className="status-msg">{status}</div>

                    {Object.keys(data).length > 0 && (
                        <div className="result-grid">
                            {EXTRACTION_MAP.map(item => (
                                <div key={item.key} className="field-box">
                                    <span className="label">{item.label}</span>
                                    <span className="value">{data[item.key]}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
