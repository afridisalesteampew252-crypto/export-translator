<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Translator Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .upload-box { border: 2px dashed #0070f3; padding: 30px; text-align: center; border-radius: 10px; cursor: pointer; background: #fafafa; margin-bottom: 20px; }
        .btn { background: #0070f3; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        .status { text-align: center; color: #0070f3; margin: 10px 0; font-weight: bold; font-size: 14px; }
        .results { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 10px; }
        .box { border: 1px solid #eee; padding: 10px; border-radius: 5px; border-left: 4px solid #0070f3; }
        .label { font-size: 11px; color: #666; font-weight: bold; }
        .val { font-size: 14px; display: block; margin-top: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        function App() {
            const [img, setImg] = React.useState(null);
            const [status, setStatus] = React.useState("");
            const [data, setData] = React.useState(null);

            const onFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setStatus("Loading...");
                
                if (file.type === "application/pdf") {
                    const reader = new FileReader();
                    reader.onload = async function() {
                        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                        const page = await pdf.getPage(1);
                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({scale: 2.0});
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                        setImg(canvas.toDataURL());
                        setStatus("File Ready.");
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    setImg(URL.createObjectURL(file));
                    setStatus("File Ready.");
                }
            };

            const translate = async () => {
                setStatus("AI Starting... (Stay on this page)");
                try {
                    const result = await Tesseract.recognize(img, 'jpn+eng', {
                        logger: m => { if(m.status === 'recognizing text') setStatus(`Reading: ${Math.floor(m.progress * 100)}%`); }
                    });
                    
                    const text = result.data.text;
                    const map = [
                        { l: "Chassis Number", r: /車台番号\s*([A-Z0-9-]+)/i },
                        { l: "Engine Model", r: /原動機の型式\s*([A-Z0-9]+)/i },
                        { l: "First Reg Date", r: /初度登録年月\s*([^\s\n]+)/ },
                        { l: "Latest Owner", r: /Owner\s*\n\s*([^\n]+)/ },
                        { l: "Weight (FF)", r: /前前軸重\s*(\d+)/ },
                        { l: "Weight (RR)", r: /後後軸重\s*(\d+)/ }
                    ];

                    const found = {};
                    map.forEach(item => {
                        const m = text.match(item.r);
                        found[item.l] = m ? m[1] : "Not Detected";
                    });

                    setData(found);
                    setStatus("Done!");
                } catch (e) {
                    setStatus("Error. Try again.");
                }
            };

            return (
                <div className="container">
                    <h2 style={{textAlign:'center', marginTop:0}}>Export Translator</h2>
                    <div className="upload-box" onClick={() => document.getElementById('file').click()}>
                        {img ? <img src={img} style={{width:'100%', maxHeight:'150px'}} /> : "Tap to Upload"}
                        <input id="file" type="file" hidden onChange={onFile} />
                    </div>
                    <button className="btn" onClick={translate} disabled={!img}>Start Translation</button>
                    <div className="status">{status}</div>
                    {data && <div className="results">
                        {Object.keys(data).map(k => (
                            <div className="box" key={k}>
                                <span className="label">{k}</span>
                                <span className="val">{data[k]}</span>
                            </div>
                        ))}
                    </div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
